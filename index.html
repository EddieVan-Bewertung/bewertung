<style>
:root {
  --bg: #1a1f2e;
  --card: #232940;
  --card-hover: #2a3150;
  --accent: #e84040;
  --accent-glow: rgba(232, 64, 64, 0.25);
  --accent-light: #ff6b6b;
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.15);
  --text: #e8e8ec;
  --text-dim: #8b8fa4;
  --border: #343a54;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  padding-top: env(safe-area-inset-top);
}

.app-header {
  background: linear-gradient(135deg, #232940 0%, #2d3555 100%);
  padding: 20px 16px 16px;
  text-align: center;
  border-bottom: 2px solid var(--accent);
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-header h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  color: var(--accent);
  letter-spacing: 1px;
}

.app-header .subtitle {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Mode Toggle */
.mode-toggle {
  display: flex;
  gap: 0;
  margin: 12px auto 0;
  max-width: 400px;
  background: var(--bg);
  border-radius: 10px;
  padding: 3px;
  border: 1px solid var(--border);
}

.mode-btn {
  flex: 1;
  padding: 10px 12px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s;
}

.mode-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* Name input */
.name-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  align-items: center;
  max-width: 600px;
  margin: 0 auto;
}

.name-bar label {
  font-size: 0.8rem;
  color: var(--text-dim);
  white-space: nowrap;
  font-weight: 700;
}

.name-bar input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
}

.name-bar input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Main content */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 8px 16px 120px;
}

/* Category */
.category {
  background: var(--card);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: border-color 0.3s;
}

.category.completed {
  border-color: var(--green);
}

.cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.cat-header:active {
  background: var(--card-hover);
}

.cat-title {
  font-weight: 800;
  font-size: 0.95rem;
  flex: 1;
}

.cat-badge {
  display: flex;
  align-items: center;
  gap: 6px;
}

.cat-count {
  font-size: 0.75rem;
  color: var(--text-dim);
  background: var(--bg);
  padding: 3px 8px;
  border-radius: 20px;
}

.cat-arrow {
  color: var(--text-dim);
  transition: transform 0.25s;
  font-size: 0.8rem;
}

.category.open .cat-arrow {
  transform: rotate(180deg);
}

.cat-body {
  display: none;
  padding: 0 16px 16px;
}

.category.open .cat-body {
  display: block;
}

/* Checklist items */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.check-item:last-of-type {
  border-bottom: none;
}

.check-box {
  width: 24px;
  height: 24px;
  min-width: 24px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}

.check-box.checked {
  background: var(--green);
  border-color: var(--green);
}

.check-box.checked::after {
  content: '✓';
  color: #1a1f2e;
  font-weight: 900;
  font-size: 0.8rem;
}

.check-label {
  font-size: 0.88rem;
  line-height: 1.5;
  color: var(--text);
  cursor: pointer;
  flex: 1;
}

.check-item.checked .check-label {
  color: var(--text-dim);
}

/* Eddie Rating */
.eddie-rating {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 2px solid var(--border);
}

.eddie-label {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
}

.eddie-stars {
  display: flex;
  gap: 6px;
}

.eddie-star {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  transition: all 0.15s;
}

.eddie-star.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: scale(1.05);
}

.eddie-star:active {
  transform: scale(0.95);
}

/* Rating helper */
.rating-helper {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}

.rating-helper p {
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.6;
}

.rating-helper strong {
  color: var(--accent);
}

/* Result card */
.result-card {
  background: linear-gradient(135deg, #2a3150 0%, #1e2540 100%);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  text-align: center;
  box-shadow: 0 4px 30px var(--accent-glow);
}

.result-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: var(--accent);
  margin-bottom: 4px;
}

.result-place {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.result-score {
  font-family: 'Fredoka One', cursive;
  font-size: 3rem;
  color: var(--accent);
  line-height: 1;
}

.result-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 4px;
}

.result-breakdown {
  margin-top: 16px;
  text-align: left;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.82rem;
}

.result-row .rr-cat {
  color: var(--text-dim);
}

.result-row .rr-val {
  font-weight: 800;
  color: var(--accent);
}

.result-row .rr-weight {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-left: 4px;
}

/* Toolbar */
.toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(0deg, var(--bg) 70%, transparent);
  padding: 20px 16px calc(env(safe-area-inset-bottom, 16px) + 8px);
  display: flex;
  gap: 8px;
  justify-content: center;
  z-index: 100;
}

.toolbar button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar button:active {
  transform: scale(0.96);
}

.btn-save {
  background: var(--accent);
  color: #fff;
}

.btn-load {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border) !important;
}

.btn-pdf {
  background: var(--green);
  color: #1a1f2e;
}

.btn-reset {
  background: var(--card);
  color: var(--accent-light);
  border: 1px solid var(--border) !important;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--card);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.85rem;
  border: 1px solid var(--accent);
  box-shadow: var(--shadow);
  z-index: 200;
  transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  text-align: center;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* File input hidden */
#fileInput {
  display: none;
}

/* Print / PDF */
@media print {
  .app-header, .toolbar, .mode-toggle, .name-bar, .toast { display: none !important; }
  body { background: white !important; color: #222 !important; padding-top: 0; }
  .container { padding: 0; max-width: 100%; }
  .category { border: 1px solid #ccc !important; break-inside: avoid; background: #fff !important; margin-bottom: 6px !important; }
  .category .cat-body { display: block !important; }
  .cat-header { background: #f5f5f5 !important; padding: 8px 12px !important; }
  .cat-title { color: #222 !important; font-size: 0.85rem !important; }
  .check-item { padding: 4px 0 !important; }
  .check-label { font-size: 0.78rem !important; }
  .check-box { width: 18px !important; height: 18px !important; min-width: 18px !important; }
  .check-box.checked { background: #333 !important; border-color: #333 !important; }
  .eddie-rating { margin-top: 8px !important; padding-top: 8px !important; }
  .eddie-label { font-size: 0.72rem !important; color: #c03030 !important; }
  .eddie-star { width: 28px !important; height: 28px !important; font-size: 0.9rem !important; }
  .eddie-star.active { background: #e84040 !important; border-color: #e84040 !important; }
  .rating-helper { margin-top: 6px !important; padding: 6px 8px !important; border-left-color: #c03030 !important; background: #fafafa !important; }
  .rating-helper p { font-size: 0.68rem !important; color: #555 !important; line-height: 1.4 !important; }
  .rating-helper strong { color: #c03030 !important; }
  .result-card { break-inside: avoid !important; page-break-inside: avoid !important; break-before: auto; border: 2px solid #e84040 !important; background: #fff5f5 !important; box-shadow: none !important; padding: 12px !important; margin-top: 8px !important; }
  .result-score { color: #c03030 !important; font-size: 2.2rem !important; }
  .result-title { color: #c03030 !important; font-size: 0.95rem !important; }
  .result-place { color: #666 !important; font-size: 0.75rem !important; }
  .result-row { padding: 3px 0 !important; font-size: 0.75rem !important; }
  .result-row .rr-cat { color: #555 !important; }
  .result-row .rr-val { color: #c03030 !important; }
  .result-label { font-size: 0.72rem !important; }

  /* Hide URL in print header/footer */
  @page {
    margin: 10mm 10mm 10mm 10mm;
  }

  /* Print header */
  .print-header { display: block !important; text-align: center; margin-bottom: 12px; padding: 10px; border-bottom: 3px solid #e84040; }
  .print-header h1 { font-family: 'Fredoka One', cursive; color: #e84040; font-size: 1.3rem; }
  .print-header p { color: #666; font-size: 0.8rem; margin-top: 4px; }
}

.print-header { display: none; }

/* Responsive */
@media (max-width: 380px) {
  .app-header h1 { font-size: 1.3rem; }
  .mode-btn { font-size: 0.78rem; padding: 8px 8px; }
  .toolbar button { padding: 10px 10px; font-size: 0.72rem; }
  .eddie-star { width: 38px; height: 38px; font-size: 1.1rem; }
}

/* Standalone mode (homescreen app) adjustments */
@media (display-mode: standalone) {
  .app-header {
    padding-top: calc(env(safe-area-inset-top) + 12px);
  }
}
</style>

<body>

<div class="print-header">
  <h1>🚐 EddieVan Bewertung</h1>
  <p id="printSubtitle"></p>
</div>

<div class="app-header">
  <h1>🚐 EddieVan Bewertung</h1>
  <div class="subtitle">Camping- & Stellplatz-Check</div>
  <div class="mode-toggle">

    <button class="mode-btn" onclick="switchMode('stellplatz')">🅿️ Stellplatz</button>
  </div>
</div>

<div class="name-bar">
  <label>📍 Platzname:</label>
  <input type="text" id="placeName" placeholder="z.B. Camping Schönblick" oninput="autoSave()">
</div>

<div class="container" id="app"></div>

<div class="toolbar">
  <button class="btn-save" onclick="saveToFile()">💾 Speichern</button>
  <button class="btn-load" onclick="document.getElementById('fileInput').click()">📂 Laden</button>
  <button class="btn-pdf" onclick="exportPDF()">📄 PDF</button>
  <button class="btn-reset" onclick="resetAll()">🗑 Neu</button>
</div>

<input type="file" id="fileInput" accept=".eddie,.json" onchange="loadFromFile(event)">
<div class="toast" id="toast"></div>

// ============ STATE ============

let currentMode = 'camping';
let state = { camping: {}, stellplatz: {} };

function initState(mode) {
  if (!state[mode].checks) {
    state[mode] = { checks: {}, ratings: {}, placeName: '' };
  }
}

// ============ RENDER ============

function render() {
  initState(currentMode);
  const data = DATA[currentMode];
  const s = state[currentMode];
  const app = document.getElementById('app');

  document.getElementById('placeName').value = s.placeName || '';

  let html = '';

  data.categories.forEach((cat, ci) => {
    const checks = cat.items.map((_, i) => s.checks[`${cat.id}_${i}`] || false);
    const checkedCount = checks.filter(Boolean).length;
    const rating = s.ratings[cat.id] || 0;
    const isComplete = rating > 0;
    const isOpen = s[`open_${cat.id}`] || false;

    html += `<div class="category ${isOpen ? 'open' : ''} ${isComplete ? 'completed' : ''}" id="cat-${cat.id}">`;
    html += `<div class="cat-header" onclick="toggleCat('${cat.id}')">`;
    html += `<span class="cat-title">${cat.title}</span>`;
    html += `<span class="cat-badge">`;
    if (rating > 0) {
      html += `<span style="font-size:0.85rem">${'🚐'.repeat(rating)}</span>`;
    }
    html += `<span class="cat-count">${checkedCount}/${cat.items.length}</span>`;
    html += `<span class="cat-arrow">▼</span>`;
    html += `</span></div>`;

    html += `<div class="cat-body">`;

    cat.items.forEach((item, i) => {
      const checked = s.checks[`${cat.id}_${i}`] || false;
      html += `<div class="check-item ${checked ? 'checked' : ''}" onclick="toggleCheck('${cat.id}', ${i})">`;
      html += `<div class="check-box ${checked ? 'checked' : ''}"></div>`;
      html += `<span class="check-label">${item}</span>`;
      html += `</div>`;
    });

    html += `<div class="eddie-rating">`;
    html += `<div class="eddie-label">Deine Bewertung für ${cat.title.split('–')[1]?.trim() || cat.title}:</div>`;
    html += `<div class="eddie-stars">`;
    for (let e = 1; e <= 5; e++) {
      html += `<div class="eddie-star ${e <= rating ? 'active' : ''}" onclick="event.stopPropagation(); setRating('${cat.id}', ${e})">🚐</div>`;
    }
    html += `</div>`;

    if (cat.helper) {
      html += `<div class="rating-helper">`;
      cat.helper.forEach(h => {
        html += `<p><strong>${h.split(':')[0]}:</strong>${h.split(':').slice(1).join(':')}</p>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
    html += `</div>`;
    html += `</div>`;
  });

  html += renderResult(data, s);
  app.innerHTML = html;
}

function renderResult(data, s) {
  let totalWeighted = 0;
  let totalWeight = 0;
  let allRated = true;
  let rows = '';

  data.categories.forEach(cat => {
    const rating = s.ratings[cat.id] || 0;
    if (rating === 0) allRated = false;
    totalWeighted += rating * cat.weight;
    totalWeight += cat.weight;

    const weightLabel = cat.weight > 1 ? ` (x${cat.weight})` : '';
    rows += `<div class="result-row">
      <span class="rr-cat">${cat.title.split('–')[0].trim()} – ${cat.title.split('–')[1]?.trim() || ''}</span>
      <span><span class="rr-val">${rating > 0 ? rating + ' 🚐' : '–'}</span><span class="rr-weight">${weightLabel}</span></span>
    </div>`;
  });

  const avg = totalWeight > 0 ? totalWeighted / totalWeight : 0;
  const rounded = Math.round(avg * 2) / 2;
  const placeName = s.placeName || 'Noch kein Name';

  // Update print header
  document.getElementById('printSubtitle').textContent = `${placeName} – ${data.label}`;

  let html = `<div class="result-card">`;
  html += `<div class="result-title">Gesamt-Eddies</div>`;
  html += `<div class="result-place">${placeName} (${data.label})</div>`;

  if (allRated) {
    html += `<div class="result-score">${rounded.toFixed(1)} 🚐</div>`;
    html += `<div class="result-label">von 5 möglichen Eddies</div>`;
  } else {
    html += `<div class="result-score" style="font-size:1.5rem; color: var(--text-dim)">Noch nicht alle Kategorien bewertet</div>`;
  }

  html += `<div class="result-breakdown">${rows}</div>`;
  html += `</div>`;
  return html;
}

// ============ INTERACTIONS ============

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function toggleCat(catId) {
  initState(currentMode);
  state[currentMode][`open_${catId}`] = !state[currentMode][`open_${catId}`];
  render();
}

function toggleCheck(catId, idx) {
  initState(currentMode);
  const key = `${catId}_${idx}`;
  state[currentMode].checks[key] = !state[currentMode].checks[key];
  autoSave();
  render();
}

function setRating(catId, val) {
  initState(currentMode);
  if (state[currentMode].ratings[catId] === val) {
    state[currentMode].ratings[catId] = 0;
  } else {
    state[currentMode].ratings[catId] = val;
  }
  autoSave();
  render();
}

// ============ STORAGE ============

function autoSave() {
  initState(currentMode);
  state[currentMode].placeName = document.getElementById('placeName').value;
  try {
    localStorage.setItem('eddievan_state', JSON.stringify(state));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('eddievan_state');
    if (saved) {
      state = JSON.parse(saved);
    }
  } catch(e) {}
}

// ============ FILE SAVE/LOAD ============

function saveToFile() {
  initState(currentMode);
  state[currentMode].placeName = document.getElementById('placeName').value;

  const exportData = {
    version: '1.0',
    tool: 'EddieVan Bewertungstool',
    exportDate: new Date().toISOString(),
    mode: currentMode,
    data: state[currentMode]
  };

  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);

  const placeName = state[currentMode].placeName || 'Bewertung';
  const safePlace = placeName.replace(/[^a-zA-Z0-9äöüÄÖÜß_\-]/g, '_');
  const dateStr = new Date().toISOString().slice(0,10);

  const a = document.createElement('a');
  a.href = url;
  a.download = `EddieVan_${safePlace}_${dateStr}.eddie`;
  a.click();
  URL.revokeObjectURL(url);

  showToast('💾 Bewertung gespeichert!');
}

function loadFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.tool !== 'EddieVan Bewertungstool') {
        showToast('❌ Das ist keine EddieVan-Datei');
        return;
      }
      currentMode = data.mode || 'camping';
      state[currentMode] = data.data;

      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.mode-btn').forEach(b => {
        if ((currentMode === 'camping' && b.textContent.includes('Camping')) ||
            (currentMode === 'stellplatz' && b.textContent.includes('Stell'))) {
          b.classList.add('active');
        }
      });

      autoSave();
      render();
      showToast(`📂 "${data.data.placeName || 'Bewertung'}" geladen!`);
    } catch(err) {
      showToast('❌ Datei konnte nicht gelesen werden');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============ PDF ============

function exportPDF() {
  initState(currentMode);
  const s = state[currentMode];
  const data = DATA[currentMode];
  const placeName = s.placeName || 'Bewertung';

  showToast('📄 PDF wird erstellt...');

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 12;
  const usable = pageW - margin * 2;

  // Helper: render a div to canvas, return image + height in mm
  function renderBlock(htmlStr) {
    return new Promise(resolve => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed;left:-9999px;top:0;background:#fff;';
      wrap.innerHTML = `<div style="font-family:Helvetica,Arial,sans-serif;width:700px;padding:12px;background:#fff;color:#222;">${htmlStr}</div>`;
      document.body.appendChild(wrap);
      const el = wrap.firstChild;
      html2canvas(el, { scale: 2, backgroundColor: '#ffffff', logging: false }).then(canvas => {
        document.body.removeChild(wrap);
        const ratio = usable / (canvas.width);
        const hMM = canvas.height * ratio;
        resolve({ data: canvas.toDataURL('image/jpeg', 0.95), w: usable, h: hMM });
      });
    });
  }

  // Build blocks
  let totalWeighted = 0;
  let totalWeight = 0;
  let allRated = true;
  let catRows = '';

  const blocks = [];

  // Header block
  blocks.push(`
    <div style="text-align:center;border-bottom:3px solid #e84040;padding-bottom:10px;">
      <div style="font-size:22px;font-weight:900;color:#e84040;">🚐 EddieVan Bewertung</div>
      <div style="font-size:13px;color:#666;margin-top:4px;">${placeName} – ${data.label}</div>
      <div style="font-size:10px;color:#999;margin-top:2px;">Bewertet am ${new Date().toLocaleDateString('de-DE')}</div>
    </div>
  `);

  // Category blocks
  data.categories.forEach(cat => {
    const rating = s.ratings[cat.id] || 0;
    if (rating === 0) allRated = false;
    totalWeighted += rating * cat.weight;
    totalWeight += cat.weight;

    const weightLabel = cat.weight > 1 ? ` (x${cat.weight})` : '';
    const eddies = rating > 0 ? '🚐'.repeat(rating) : '–';
    catRows += `<tr><td style="padding:4px 8px;border-bottom:1px solid #eee;color:#555;font-size:11px;">${cat.title}</td><td style="padding:4px 8px;border-bottom:1px solid #eee;text-align:right;font-weight:800;color:#c03030;font-size:11px;">${eddies}${weightLabel}</td></tr>`;

    let checks = '';
    cat.items.forEach((item, i) => {
      const checked = s.checks[`${cat.id}_${i}`] || false;
      const icon = checked ? '☑' : '☐';
      const color = checked ? '#333' : '#999';
      checks += `<div style="padding:2px 0;font-size:10px;color:${color};">${icon} ${item}</div>`;
    });

    const ratingDisplay = rating > 0 ? '🚐'.repeat(rating) + ` (${rating}/5)` : 'Nicht bewertet';

    blocks.push(`
      <div style="margin-bottom:4px;">
        <div style="background:#f5f5f5;padding:6px 10px;font-weight:800;font-size:12px;border-radius:6px 6px 0 0;border:1px solid #ddd;border-bottom:none;">${cat.title}</div>
        <div style="padding:8px 10px;border:1px solid #ddd;border-radius:0 0 6px 6px;">
          ${checks}
          <div style="margin-top:6px;padding-top:6px;border-top:2px solid #eee;font-size:10px;color:#c03030;font-weight:700;">Bewertung: ${ratingDisplay}</div>
        </div>
      </div>
    `);
  });

  const avg = totalWeight > 0 ? totalWeighted / totalWeight : 0;
  const rounded = Math.round(avg * 2) / 2;

  // Result block
  blocks.push(`
    <div style="border:2px solid #e84040;border-radius:10px;padding:16px;background:#fff5f5;text-align:center;">
      <div style="font-size:16px;font-weight:900;color:#e84040;">Gesamt-Eddies</div>
      <div style="font-size:11px;color:#666;margin:4px 0 12px;">${placeName} (${data.label})</div>
      ${allRated
        ? `<div style="font-size:36px;font-weight:900;color:#e84040;">${rounded.toFixed(1)} 🚐</div>
           <div style="font-size:10px;color:#666;margin-top:4px;">von 5 möglichen Eddies</div>`
        : `<div style="font-size:14px;color:#999;">Noch nicht alle Kategorien bewertet</div>`
      }
      <table style="width:100%;margin-top:12px;border-collapse:collapse;">${catRows}</table>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:9px;color:#bbb;">© EddieVan YouTube-Kanal</div>
  `);

  // Render all blocks sequentially, place on pages
  async function buildPDF() {
    let curY = margin;

    for (let i = 0; i < blocks.length; i++) {
      const img = await renderBlock(blocks[i]);

      // If block doesn't fit on current page, start new page
      if (curY + img.h > pageH - margin && curY > margin) {
        pdf.addPage();
        curY = margin;
      }

      // If single block is taller than a page, scale it down
      if (img.h > pageH - margin * 2) {
        const scale = (pageH - margin * 2) / img.h;
        pdf.addImage(img.data, 'JPEG', margin, curY, img.w * scale, img.h * scale);
        curY += img.h * scale + 4;
      } else {
        pdf.addImage(img.data, 'JPEG', margin, curY, img.w, img.h);
        curY += img.h + 4;
      }
    }

    const safePlace = placeName.replace(/[^a-zA-Z0-9äöüÄÖÜß_\-]/g, '_');
    pdf.save(`EddieVan_${safePlace}_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('📄 PDF gespeichert!');
  }

  buildPDF().catch(err => {
    showToast('❌ PDF-Erstellung fehlgeschlagen');
    console.error(err);
  });
}

// ============ RESET ============

function resetAll() {
  if (!confirm(`Bewertung für ${DATA[currentMode].label} wirklich zurücksetzen?`)) return;
  state[currentMode] = { checks: {}, ratings: {}, placeName: '' };
  autoSave();
  render();
  showToast('🗑 Zurückgesetzt');
}

// ============ TOAST ============

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ INIT ============

loadFromStorage();
render();
